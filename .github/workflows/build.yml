name: Build custom geosite

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout repo
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Setup Go
      # =========================
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # =========================
      # Download base geosite (Loyalsoldier)
      # =========================
      - name: Download base geosite
        run: |
          mkdir -p build
          curl -L -o build/base.dat \
          https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat

      # =========================
      # Copy custom rules
      # =========================
      - name: Prepare custom rules
        run: |
          mkdir -p build/custom
          cp -r data/* build/custom/

      # =========================
      # Run merge builder
      # =========================
      - name: Build merged geosite
        run: |
          cat << 'EOF' > builder.go
          package main

          import (
            "fmt"
            "os"
            "strings"
          )

          func main() {
            fmt.Println("Custom merge placeholder - replace with real builder later")

            files, _ := os.ReadDir("build/custom")

            out := ""

            for _, f := range files {
              data, _ := os.ReadFile("build/custom/" + f.Name())
              lines := strings.Split(string(data), "\n")

              out += "\n#" + f.Name() + "\n"
              for _, l := range lines {
                l = strings.TrimSpace(l)
                if l == "" {
                  continue
                }
                out += l + "\n"
              }
            }

            os.WriteFile("build/custom.txt", []byte(out), 0644)
          }
          EOF

          go run builder.go

      # =========================
      # Pack final files
      # =========================
      - name: Create release files
        run: |
          mkdir -p release

          cp build/base.dat release/geosite-base.dat
          cp build/custom.txt release/geosite-custom.txt

          sha256sum release/* > release/SHA256SUMS

      # =========================
      # GitHub Release
      # =========================
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Custom geosite build"
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
