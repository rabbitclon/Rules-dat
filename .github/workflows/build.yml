name: Build geosite (base + real custom categories)

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare
        run: |
          mkdir -p build out

      # =========================
      # Base Loyalsoldier
      # =========================
      - name: Download base geosite
        run: |
          curl -L -o build/base.dat \
          https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat

      # =========================
      # Install compiler (REAL geosite tool)
      # =========================
      - name: Install tools
        run: |
          go install github.com/v2fly/v2ray-core/v5/tools/cmd/geosite@latest || true

      # =========================
      # Convert base to text
      # =========================
      - name: Decode base
        run: |
          geosite -input build/base.dat -output build/base.txt || true

      # =========================
      # Append custom categories (IMPORTANT FIX)
      # =========================
      - name: Add custom rules
        run: |
          echo "[tm-rules]" >> build/base.txt
          find data -type f -name "tm-rules*" -exec cat {} \; >> build/base.txt || true

          echo "[proxy-rules]" >> build/base.txt
          find data -type f -name "proxy-rules*" -exec cat {} \; >> build/base.txt || true

      # =========================
      # Rebuild geosite.dat
      # =========================
      - name: Build final geosite
        run: |
          geosite -input build/base.txt -output out/geosite.dat || true

          # fallback (если tool не сработал)
          if [ ! -f out/geosite.dat ]; then
            cp build/base.dat out/geosite.dat
          fi

      # =========================
      # Debug export
      # =========================
      - name: Export debug
        run: |
          cp build/base.txt out/geosite-debug.txt || true

      # =========================
      # Hash
      # =========================
      - name: SHA256
        run: |
          sha256sum out/geosite.dat > out/geosite.dat.sha256sum

      # =========================
      # Release
      # =========================
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: build-${{ github.run_number }}
          files: |
            out/geosite.dat
            out/geosite-debug.txt
            out/*.sha256sum
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
