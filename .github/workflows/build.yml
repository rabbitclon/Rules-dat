name: Build geosite.dat

on:
  push:
    paths:
      - "data/**"

  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Clone domain-list-community
        run: |
          git clone https://github.com/v2fly/domain-list-community.git dlc

      - name: Copy custom rules
        run: |
          cp data/* dlc/data/

      - name: Build geosite.dat
        run: |
          cd dlc
          go run ./ --outputdir=output

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: dlc/output/geosite.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
