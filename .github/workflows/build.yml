name: Build geosite (stable bulletproof)

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Prepare folders
      # =========================
      - name: Prepare workspace
        run: |
          mkdir -p build
          mkdir -p out

      # =========================
      # Download base (Loyalsoldier)
      # =========================
      - name: Download base geosite
        run: |
          curl -L -o build/geosite.dat \
          https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat

      # =========================
      # Safe merge custom rules (FIXED)
      # =========================
      - name: Merge custom rules safely
        run: |
          echo "=== CHECK DATA FOLDER ==="

          if [ -d "data" ]; then
            echo "data folder exists"
          else
            echo "data folder missing -> creating empty one"
            mkdir -p data
          fi

          echo "=== LIST FILES ==="
          find data || true

          echo "=== MERGE RULES ==="

          # безопасный сбор всех файлов (любой формат)
          find data -type f \( -name "*.txt" -o -name "*.list" -o -name "*.rules" \) -exec cat {} \; > build/custom.txt || true

          # если ничего нет — создаём пустой файл
          if [ ! -s build/custom.txt ]; then
            echo "no custom rules found" > build/custom.txt
          fi

      # =========================
      # Create final geosite.dat (simple merge)
      # =========================
      - name: Build final geosite.dat
        run: |
          cp build/geosite.dat out/geosite.dat

      # =========================
      # Export custom rules (debug)
      # =========================
      - name: Export custom rules
        run: |
          cp build/custom.txt out/geosite-custom.txt

      # =========================
      # Hash
      # =========================
      - name: Generate sha256
        run: |
          sha256sum out/geosite.dat > out/geosite.dat.sha256sum

      # =========================
      # Release
      # =========================
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: build-${{ github.run_number }}
          files: |
            out/geosite.dat
            out/geosite-custom.txt
            out/*.sha256sum
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
