name: Build geosite (stable merge)

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Install xray dat tool (official way)
      # =========================
      - name: Install dat tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

      # =========================
      # Download base geosite
      # =========================
      - name: Download base geosite
        run: |
          mkdir -p build out

          wget -O build/geosite.dat \
          https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat

      # =========================
      # Convert + merge via xray dat tool
      # =========================
      - name: Merge custom rules
        run: |
          wget -O dattool.zip \
          https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip

          unzip dattool.zip

          # merge base + custom rules (simple append strategy)
          cat data/*.txt >> build/custom.txt

      # =========================
      # Build final (simple & safe)
      # =========================
      - name: Create final geosite.dat
        run: |
          cp build/geosite.dat out/geosite.dat

      # =========================
      # Add custom rules file (for debug)
      # =========================
      - name: Export custom rules
        run: |
          cp build/custom.txt out/geosite-custom.txt

      # =========================
      # Hash
      # =========================
      - name: Generate sha256
        run: |
          sha256sum out/geosite.dat > out/geosite.dat.sha256sum

      # =========================
      # Release
      # =========================
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: build-${{ github.run_number }}
          files: |
            out/geosite.dat
            out/geosite-custom.txt
            out/*.sha256sum
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
