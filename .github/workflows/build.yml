name: build-geosite-custom

on:
  push:
    paths:
      - "custom/**"
      - "build.sh"

  schedule:
    - cron: "0 * * * *"   # каждый час

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # важно для release

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq wget tar

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Build geosite
        run: ./build.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: geosite-custom
          files: work/geosite-custom.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
