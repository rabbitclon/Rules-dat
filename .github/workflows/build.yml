name: Build geosite (base + custom rules)

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Create folders
      # =========================
      - name: Prepare workspace
        run: |
          mkdir -p build
          mkdir -p out

      # =========================
      # Download base geosite (Loyalsoldier)
      # =========================
      - name: Download base geosite
        run: |
          curl -L -o build/geosite-base.dat \
          https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat

      # =========================
      # Install geosite tool
      # =========================
      - name: Install geosite tool
        run: |
          go install github.com/v2fly/v2ray-core/v5/tools/conf/geosite@latest

      # =========================
      # Convert base to editable format
      # =========================
      - name: Decode base geosite
        run: |
          geosite -input build/geosite-base.dat -output build/base.txt

      # =========================
      # Add your custom rules
      # =========================
      - name: Merge custom rules
        run: |
          cat data/*.txt >> build/base.txt

      # =========================
      # Rebuild geosite.dat
      # =========================
      - name: Build final geosite
        run: |
          geosite -input build/base.txt -output out/geosite.dat

      # =========================
      # Download geoip
      # =========================
      - name: Download geoip
        run: |
          curl -L -o out/geoip.dat \
          https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat

      # =========================
      # Hashes
      # =========================
      - name: Generate sha256
        run: |
          sha256sum out/geosite.dat > out/geosite.dat.sha256sum
          sha256sum out/geoip.dat > out/geoip.dat.sha256sum

      # =========================
      # Release
      # =========================
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: build-${{ github.run_number }}
          files: |
            out/geosite.dat
            out/geoip.dat
            out/*.sha256sum
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
