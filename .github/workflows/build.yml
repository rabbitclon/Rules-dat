name: Build geosite.dat

on:
  push:
    paths:
      - "data/**"
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget curl

      # 1. берём официальный билд Loyalsoldier
      - name: Clone Loyalsoldier build system
        run: |
          git clone https://github.com/Loyalsoldier/v2ray-rules-dat.git build

      # 2. добавляем твои правила
      - name: Inject custom rules
        run: |
          cp data/* build/data/

      # 3. собираем geosite.dat
      - name: Build geosite.dat
        run: |
          cd build
          chmod +x release.sh
          ./release.sh

      # 4. подготавливаем файл
      - name: Prepare output
        run: |
          mkdir -p out
          cp build/publish/geosite.dat out/geosite.dat

      # 5. создаём release
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: geosite-custom
          files: out/geosite.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
