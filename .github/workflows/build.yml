name: Build custom rules

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # CHECKOUT (FIXED)
      # =========================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # SETUP GO
      # =========================
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # =========================
      # CLONE DLC
      # =========================
      - name: Clone domain-list-community
        run: |
          git clone https://github.com/v2fly/domain-list-community.git dlc

      # =========================
      # COPY CUSTOM DATA
      # =========================
      - name: Copy custom data
        run: |
          cp -r data/* dlc/data/

      # =========================
      # BUILD GEOSITE
      # =========================
      - name: Build geosite.dat
        run: |
          mkdir -p out
          cd dlc || exit 1
          go run ./ \
            --outputdir=../out \
            --outputname=geosite.dat

      # =========================
      # DOWNLOAD GEOIP (OFFICIAL)
      # =========================
      - name: Download geoip.dat
        run: |
          curl -L -o out/geoip.dat \
          https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat

      # =========================
      # GENERATE HASH
      # =========================
      - name: Generate sha256
        run: |
          sha256sum out/geoip.dat > out/geoip.dat.sha256sum
          sha256sum out/geosite.dat > out/geosite.dat.sha256sum

      # =========================
      # RELEASE (LATEST FIXED)
      # =========================
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          files: |
            out/geoip.dat
            out/geosite.dat
            out/*.sha256sum
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
