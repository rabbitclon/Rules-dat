name: Build geosite.dat

on:
  push:
    paths:
      - "data/**"
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Clone domain-list-community
        run: |
          git clone https://github.com/v2fly/domain-list-community.git dlc

      - name: Inject custom rules
        run: |
          cp data/* dlc/data/

      - name: Build geosite.dat
        run: |
          cd dlc
          go run ./ --outputdir=output

      - name: Export result
        run: |
          mkdir -p out
          cp dlc/output/geosite.dat out/geosite.dat

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: out/geosite.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
