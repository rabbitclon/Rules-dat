name: Build geosite (Loyalsoldier + custom merge)

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Setup Go
      # =========================
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # =========================
      # Download base geosite (Loyalsoldier)
      # =========================
      - name: Download base geosite
        run: |
          mkdir -p build
          curl -L -o build/base.dat \
          https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat

      # =========================
      # Init Go module + deps (FIX)
      # =========================
      - name: Setup Go modules
        run: |
          go mod init geosite-builder || true

          go get google.golang.org/protobuf/proto
          go get github.com/v2fly/v2ray-core/v5/app/router/routercommon

      # =========================
      # Build merged geosite
      # =========================
      - name: Build geosite.dat
        run: |
          mkdir -p out

          go run builder.go \
            --base build/base.dat \
            --custom data \
            --output out/geosite.dat

      # =========================
      # Download geoip (optional)
      # =========================
      - name: Download geoip.dat
        run: |
          curl -L -o out/geoip.dat \
          https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat

      # =========================
      # Generate hashes
      # =========================
      - name: Generate sha256
        run: |
          sha256sum out/geosite.dat > out/geosite.dat.sha256sum
          sha256sum out/geoip.dat > out/geoip.dat.sha256sum

      # =========================
      # Release
      # =========================
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: build-${{ github.run_number }}
          files: |
            out/geosite.dat
            out/geoip.dat
            out/*.sha256sum
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
