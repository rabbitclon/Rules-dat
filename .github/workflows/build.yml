name: build-xray-geosite

on:
  push:
    paths:
      - "custom/**"
      - "build.sh"

  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip sed

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: geosite-custom
          files: work/geosite-custom.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
